<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UserCore</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        body {
            margin: 0;
            font-family: Inter, sans-serif;
            background: #0B1220;
            color: #E5E7EB;
        }

        /* NAV */
        header {
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 22px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            font-weight: 600;
        }

        /* PAGE */
        .container {
            max-width: 1000px;
            margin: auto;
            padding: 30px 20px;
        }

        /* FORM */
        form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: white;
            outline: none;
        }

        input[type="submit"] {
            padding: 12px 16px;
            border-radius: 10px;
            border: none;
            background: #3B82F6;
            color: white;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background: #22D3EE;
        }

        /* PROJECT GRID */
        .projects-container {
            list-style: none;
            padding: 0;
            margin: 0;

            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
        }

        /* PROJECT CARD */
        .ind-proj {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            padding: 16px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
        }

        .ind-proj:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* EMPTY STATE */
        .is-empty {
            font-size: 18px;
            opacity: 0.6;
        }
    </style>
</head>

<body>

    <header>UserCore</header>

    <div class="container">

        <h2 style="margin-bottom:10px;">Projects</h2>

        <form id="form">
            <input type="text" name="projectName" id="projectName" placeholder="New Project">
            <input type="submit" value="Create">
        </form>

        <ul class="projects-container"></ul>

    </div>

    <script  type ="module" src="index.js"></script>

</body>

</html>
