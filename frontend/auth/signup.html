<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Inter, sans-serif;
            background: #0B1220;
            color: #E6EDF7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            width: 360px;
            max-width: 92%;
            padding: 22px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        h2 {
            margin: 0 0 8px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
            color: #E6EDF7;
            outline: none;
        }

        input:focus {
            border-color: rgba(59, 130, 246, 0.6);
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #3B82F6;
            color: white;
            cursor: pointer;
            font-weight: 500;
        }

        button:hover {
            background: #22D3EE;
        }

        .link {
            text-align: center;
            font-size: 13px;
            color: rgba(230, 237, 247, 0.7);
            text-decoration: none;
        }

        .link:hover {
            color: #22D3EE;
        }

        /* password */
        .pass-wrap {
            position: relative;
            width: 100%;
        }

        .eye-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            width: 22px;
            height: 22px;
            opacity: 0.7;
        }

        .eye-btn:hover {
            opacity: 1;
        }

        .eye-btn svg {
            width: 20px;
            height: 20px;
            stroke: #E6EDF7;
            fill: none;
            stroke-width: 1.8;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Create Account</h2>

        <form id="signupForm">
            <input id="name" placeholder="Name" required />
            <input id="email" placeholder="Email" required />

            <div class="pass-wrap">
                <input id="password" type="password" placeholder="Password" required />

                <div class="eye-btn" onclick="togglePassword()">
                    <svg id="eyeOpen" viewBox="0 0 24 24">
                        <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>

                    <svg id="eyeOff" style="display:none" viewBox="0 0 24 24">
                        <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-6.5 0-10-7-10-7a20.77 20.77 0 0 1 5.17-5.94" />
                        <path d="M1 1l22 22" />
                        <path d="M9.88 9.88A3 3 0 0 0 12 15a3 3 0 0 0 2.12-.88" />
                        <path d="M12 5c6.5 0 10 7 10 7a20.77 20.77 0 0 1-3.37 4.38" />
                    </svg>
                </div>
            </div>

            <button>Create Account</button>
        </form>

        <a class="link" href="login.html">Already have an account? Login</a>
    </div>

    <script type="module" src="signup.js"></script>

</body>

</html>
